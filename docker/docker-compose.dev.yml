version: "3.9"

services:
  tinyllama-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "7860:7860"
    volumes:
      - ../app:/app/app          # hot reload
      - ../models:/app/models    # cache models locally
    env_file:
      - ../.env.dev
    environment:
      - ENV=dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
